<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookies DC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #04102b;
      --navy2: #0a1c41;
      --blue: #1a73e8;
      --blue-bright: #5b9dff;
      --ice: #cfe0ff;
      --line: rgba(91, 157, 255, .2);
      --white: #f4f8ff;
      --muted: #8ea3cf;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 28px;
    }
    .grad {
      background: linear-gradient(100deg, var(--blue-bright), #9db8ff 60%, var(--blue-bright));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h1 {
      font-weight: 800;
      font-size: clamp(36px, 6vw, 72px);
      letter-spacing: -.02em;
      line-height: 1.02;
      margin-bottom: 20px;
    }
    p {
      font-size: clamp(16px, 2vw, 20px);
      color: var(--ice);
      max-width: 600px;
      margin-bottom: 30px;
    }
    a {
      display: inline-block;
      background: var(--blue);
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: .02em;
      padding: 17px 38px;
      border-radius: 100px;
      text-decoration: none;
      box-shadow: 0 14px 40px -12px rgba(31, 92, 240, .8);
      transition: transform .4s cubic-bezier(.16, 1, .3, 1), box-shadow .4s;
    }
    a:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 50px -12px rgba(31, 92, 240, .95);
    }
  </style>
</head>
<body>
  <h1>Cookies <span class="grad">DC</span></h1>
  <p>The premier Cookies dispensary in Washington, DC. Community-first. Culture-driven.</p>
  <a href="Cookies-For-The-Owner.html">Explore the Playbook →</a>
</body>
</html>
